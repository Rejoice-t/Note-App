<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>
<body>

    <h1>My Notes App</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Enter note">

        <button type="submit">Add Note</button>
    </form>

    <hr>

    <h2>Notes</h2>

    <ul>
        {% for note in notes %}
<li>
    {{ note.title }}

    <a href="/delete/{{ note.id }}/">
        Delete
    </a>
</li>        {% endfor %}
    </ul>

</body>
</html>
